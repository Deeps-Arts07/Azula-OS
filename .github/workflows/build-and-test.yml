name: Build and Test Azula OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, arm]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache APT Packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-cache-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('build/setup-dev-env.sh') }}
        restore-keys: |
          apt-cache-${{ runner.os }}-${{ matrix.arch }}-

    - name: Cache Python Virtual Environment
      uses: actions/cache@v4
      with:
        path: sel4-venv
        key: venv-${{ runner.os }}-${{ hashFiles('build/setup-dev-env.sh') }}
        restore-keys: |
          venv-${{ runner.os }}-

    - name: Set up Environment
      run: |
        chmod +x ./build/setup-dev-env.sh
        ./build/setup-dev-env.sh --arch=${{ matrix.arch }}
        echo "$HOME/.bin" >> $GITHUB_PATH
        
        # Fix permissions for the cache action to avoid tar exit code 2
        sudo chown -R $USER:$USER /var/cache/apt/archives
        sudo rm -f /var/cache/apt/archives/lock || true

    - name: Initialize seL4 Workspace
      run: |
        mkdir -p workspace
        cd workspace
        repo init -u https://github.com/seL4/camkes-manifest.git
        repo sync
        
        # Inject our custom kernel and components into the manifest workspace
        rm -rf kernel
        ln -s ../kernel ./kernel
        
        mkdir -p projects/camkes/apps/AzulaOS
        # Copy the AzulaOS root assembly
        cp -R ../apps/AzulaOS/* projects/camkes/apps/AzulaOS/
        
        # Copy the camkes-components directory so relative paths work
        cp -R ../camkes-components ./


    - name: Build Phase 2 Image
      run: |
        source sel4-venv/bin/activate
        cd workspace
        mkdir build
        cd build
        if [ "${{ matrix.arch }}" == "x86" ]; then
          ../init-build.sh -DCAMKES_APP=AzulaOS -DPLATFORM=pc99 -DSIMULATION=TRUE
        else
          ../init-build.sh -DCAMKES_APP=AzulaOS -DPLATFORM=qemu-arm-virt -DAARCH64=1 -DSIMULATION=TRUE
        fi
        ninja

    - name: Test Output (QEMU)
      run: |
        cd workspace/build
        
        # The build system generates a ./simulate script with the correct QEMU args
        ./simulate > serial_output.log &
        QEMU_PID=$!
        
        # Wait up to 60 seconds for the boot sequence to complete and print our strings
        for i in {1..60}; do
          if grep -q "Azula Framebuffer Initialized" serial_output.log && \
             grep -q "Azula USB Host Initialized" serial_output.log && \
             grep -q "Running static init script" serial_output.log && \
             grep -q "Boot Sequence Complete" serial_output.log; then
            echo "Success: Found all Phase 2 initialization markers in serial output!"
            kill $QEMU_PID || true
            exit 0
          fi
          sleep 1
        done
        
        echo "Error: Did not find all expected Phase 2 markers in serial output."
        echo "=== Serial Output ==="
        cat serial_output.log
        kill $QEMU_PID || true
        exit 1
